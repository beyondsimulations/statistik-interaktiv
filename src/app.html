<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#fbf8f4" />

		<!-- Favicons & PWA manifest (%sveltekit.assets% → base-path-aware assets prefix) -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32.png" sizes="32x32" type="image/png" />
		<link rel="alternate icon" href="%sveltekit.assets%/favicon.ico" sizes="16x16 32x32 48x48" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" sizes="180x180" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Nunito:wght@400..800&display=swap"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Oshu AI chat assistant (see /datenschutz) -->
		<script defer src="https://oshu.eu/widget.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				// Guard so a blocked/failed widget.js (adblock, host down) can't throw.
				if (typeof ChatWidget !== 'undefined') {
					ChatWidget.init({
						tenant: 'platform',
						agent: 'statistik-interaktiv',
						layoutMode: 'sidebar'
					});
				}
			});
		</script>

		<!-- Umami privacy-friendly analytics, self-hosted (see /datenschutz) -->
		<script
			defer
			src="https://umi.byndsim.com/script.js"
			data-website-id="e230d76b-b0a6-477e-8c5d-19a7bd661e68"
		></script>
	</body>
</html>
