<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#fbf8f4" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Nunito:wght@400..800&display=swap"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Oshu AI chat assistant (see /datenschutz) -->
		<script defer src="https://oshu.eu/widget.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				ChatWidget.init({
					tenant: 'platform',
					agent: 'statistik-interaktiv',
					layoutMode: 'sidebar'
				});
			});
		</script>

		<!-- Umami privacy-friendly analytics, self-hosted (see /datenschutz) -->
		<script
			defer
			src="https://umi.byndsim.com/script.js"
			data-website-id="e230d76b-b0a6-477e-8c5d-19a7bd661e68"
		></script>
	</body>
</html>
